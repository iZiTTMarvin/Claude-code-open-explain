version: 2
snapshot_ref: "Claude-code-open@33bf4acc3b902ce607d93f069578666d82743e58"
terms:
  - id: "main-flow"
    zh: "主链路"
    en: "main flow"
    code: "MF-01..MF-10"
    kind: "runtime-framework"
    definition_zh: "Wave 1 用来统一章节、evidence 和源码入口的核心运行链路。"

  - id: "hero-flow"
    zh: "主样板链路"
    en: "hero flow"
    code: "permission-confirmed edit task"
    kind: "teaching-scenario"
    definition_zh: "当前最先做深、最能代表系统核心机制的教学样板。"

  - id: "contrast-flow"
    zh: "对照流"
    en: "contrast flow"
    code: "read-only / compact-resume"
    kind: "teaching-scenario"
    definition_zh: "用于提醒读者 hero flow 不是系统全貌的辅助链路。"

  - id: "system-context"
    zh: "系统上下文"
    en: "system context"
    code: "getSystemContext()"
    kind: "runtime-context"
    definition_zh: "由系统环境、配置和规则生成的上下文输入。"

  - id: "user-context"
    zh: "用户上下文"
    en: "user context"
    code: "getUserContext()"
    kind: "runtime-context"
    definition_zh: "由当前用户、仓库状态和任务现场生成的上下文输入。"

  - id: "effective-system-prompt"
    zh: "生效中的系统提示词"
    en: "effective system prompt"
    code: "buildEffectiveSystemPrompt()"
    kind: "prompt-assembly"
    definition_zh: "经过 override / coordinator / agent / custom / default / append 等优先级装配后的最终系统提示词。"

  - id: "query-loop"
    zh: "查询循环"
    en: "query loop"
    code: "queryLoop()"
    kind: "runtime-loop"
    definition_zh: "真正反复推进模型请求、工具执行、结果回流和续跑判断的主循环本体。"

  - id: "tool-pool"
    zh: "工具池"
    en: "tool pool"
    code: "toolUseContext.options.tools / assembleToolPool()"
    kind: "runtime-capability-set"
    definition_zh: "当前会话真正可执行的工具集合，不等于单纯的 built-in 注册结果。"

  - id: "tool-use"
    zh: "工具调用请求"
    en: "tool use"
    code: "tool_use"
    kind: "protocol-block"
    definition_zh: "模型输出的、希望调用本地工具的结构化请求。"

  - id: "tool-result"
    zh: "工具结果"
    en: "tool result"
    code: "ToolResult<T>"
    kind: "runtime-result"
    definition_zh: "工具实现返回给执行层的原始结果结构，可能包含 data、contextModifier、newMessages、mcpMeta。"

  - id: "tool-result-block"
    zh: "tool_result 协议块"
    en: "tool_result block"
    code: "tool_result"
    kind: "protocol-block"
    definition_zh: "发给模型的协议层结果块，不等于工具原始返回值，也不等于最终 UI 展示。"

  - id: "permission-mode"
    zh: "权限模式"
    en: "permission mode"
    code: "PermissionMode / initialPermissionModeFromCLI()"
    kind: "safety-control"
    definition_zh: "决定某类工具动作是自动允许、询问还是直接拒绝的模式层。"

  - id: "source-anchor"
    zh: "源码锚点"
    en: "source anchor"
    code: "sourceAnchor / relatedAnchors"
    kind: "evidence-metadata"
    definition_zh: "把一条结论稳定绑定到源码快照中的文件、符号和片段指纹。"

  - id: "evidence"
    zh: "证据项"
    en: "evidence item"
    code: "EV-Wxx-..."
    kind: "fact-unit"
    definition_zh: "事实层的最小单元，供章节和总图引用。"

  - id: "section-manifest"
    zh: "章节清单"
    en: "section manifest"
    code: "research/section-manifests/*.yml"
    kind: "mapping-artifact"
    definition_zh: "章节与 evidence 之间的映射清单，控制回填链路。"

  - id: "auto-compact"
    zh: "自动压缩"
    en: "auto compact"
    code: "shouldAutoCompact() / getAutoCompactThreshold()"
    kind: "context-management"
    definition_zh: "上下文接近阈值时，系统为续跑而触发的压缩策略。"

  - id: "compact"
    zh: "压缩"
    en: "compact"
    code: "compactConversation() / buildPostCompactMessages()"
    kind: "context-management"
    definition_zh: "把较长历史重组为更短但可继续工作的上下文形态的总称，不等于简单删历史。"

  - id: "mcp"
    zh: "MCP"
    en: "Model Context Protocol"
    code: "services/mcp/*"
    kind: "integration-protocol"
    definition_zh: "把外部工具、命令、资源和 instructions 接入 Claude Code 的统一扩展协议。"

  - id: "mcp-instructions-delta"
    zh: "MCP 指令增量"
    en: "mcp instructions delta"
    code: "mcp_instructions_delta"
    kind: "attachment-block"
    definition_zh: "把高波动的 MCP instructions 从稳定 prompt 前缀迁出后，用 attachment 形式增量注入的机制。"

  - id: "truth-chain"
    zh: "真相链"
    en: "truth chain"
    code: "snapshot -> evidence -> section manifest -> chapter"
    kind: "governance-rule"
    definition_zh: "研究层到正文层的单向事实链，要求事实只能由 evidence 向后流动，不能从章节反写回来。"
